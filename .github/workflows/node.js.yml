# Builds and tests the support bundle visualizer using pnpm.
# Stage 1 (generate) bakes diagnostic data into bundleData.ts; Stage 2 (build) produces the standalone HTML.

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: latest
    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'pnpm'
    - run: pnpm install --frozen-lockfile
    - run: pnpm run generate
    - run: pnpm run build
    - run: pnpm exec vitest run
